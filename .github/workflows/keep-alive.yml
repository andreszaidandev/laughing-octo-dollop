name: Keep alive Green

on:
  schedule:
    - cron: "5 18 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Commit 1–10 heartbeats
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          COUNT=$(( RANDOM % 10 + 1 ))
          echo "Committing $COUNT times today..."

          for i in $(seq 1 $COUNT); do
            echo "$(date -u +%F\ %T) — heartbeat $i/$COUNT" >> .keepalive
            git add .keepalive
            git commit -m "chore: heartbeat $(date -u +%F) [$i/$COUNT]"
            sleep 2
          done

          git push
